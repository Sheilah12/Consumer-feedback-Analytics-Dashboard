<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alerts — Power Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <button type="button" class="mobile-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__brand-title">Power<span>Monitor</span></div>
        <div class="sidebar__brand-sub">Energy &amp; Theft Detection</div>
      </div>
      <nav class="sidebar__nav">
        <a href="/"><span class="sidebar__nav-icon">◉</span> Dashboard</a>
        <a href="/history"><span class="sidebar__nav-icon">▤</span> History</a>
        <a href="/budget"><span class="sidebar__nav-icon">$</span> Budget</a>
        <a href="/alerts" class="active"><span class="sidebar__nav-icon">⚠</span> Alerts</a>
        <a href="/settings"><span class="sidebar__nav-icon">⚙</span> Settings</a>
      </nav>
      <div class="sidebar__footer">Theft detection log</div>
    </aside>
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Theft Alert Log</h1>
          <p class="subtitle">Events when differential current exceeds the configured threshold</p>
        </div>
      </header>
      <div class="toolbar">
        <label><input type="checkbox" id="filter-unack" /> Unacknowledged only</label>
        <button type="button" class="btn" id="alerts-refresh">Refresh</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Differential (mA)</th>
              <th>Message</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="alerts-body">
            <tr><td colspan="5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/admin-auth.js"></script>
  <script>
    const AA = window.AdminAuth;

    async function loadAlerts() {
      const unack = document.getElementById("filter-unack").checked;
      const url = `/api/alerts?limit=100&offset=0${unack ? "&acknowledged=false" : ""}`;
      const res = await fetch(url);
      const tbody = document.getElementById("alerts-body");
      if (!res.ok) {
        tbody.innerHTML = "<tr><td colspan=\"5\">Failed to load alerts.</td></tr>";
        return;
      }
      const body = await res.json();
      const alerts = body.items || body;
      if (!alerts.length) {
        tbody.innerHTML = "<tr><td colspan=\"5\">No alerts recorded.</td></tr>";
        return;
      }
      tbody.innerHTML = alerts.map((a) => {
        const ts = new Date(a.timestamp).toLocaleString();
        const status = a.acknowledged
          ? '<span class="status-dot status-dot--ok"></span> Ack'
          : '<span class="status-dot status-dot--err"></span> Open';
        const btn = a.acknowledged
          ? ""
          : `<button type="button" class="btn btn--primary" data-id="${a.id}">Acknowledge</button>`;
        return `<tr>
          <td class="mono">${ts}</td>
          <td class="mono">${a.differential_ma.toFixed(0)}</td>
          <td>${a.message}</td>
          <td>${status}</td>
          <td>${btn}</td>
        </tr>`;
      }).join("");
    }

    document.getElementById("alerts-body").addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-id]");
      if (!btn) return;
      const res = await fetch(`/api/alerts/${btn.dataset.id}/ack`, {
        method: "POST",
        headers: AA ? AA.adminHeaders() : {},
      });
      if (!res.ok && res.status === 401) {
        alert("Unauthorized — set the Admin token on the Settings page.");
        return;
      }
      loadAlerts();
    });

    document.getElementById("alerts-refresh").addEventListener("click", loadAlerts);
    document.getElementById("filter-unack").addEventListener("change", loadAlerts);
    document.getElementById("sidebar-toggle")?.addEventListener("click", () => {
      document.querySelector(".sidebar")?.classList.toggle("open");
    });
    document.addEventListener("DOMContentLoaded", loadAlerts);
  </script>
</body>
</html>
