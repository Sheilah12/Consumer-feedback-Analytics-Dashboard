<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget — Power Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <button type="button" class="mobile-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__brand-title">Power<span>Monitor</span></div>
        <div class="sidebar__brand-sub">Energy &amp; Theft Detection</div>
      </div>
      <nav class="sidebar__nav">
        <a href="/"><span class="sidebar__nav-icon">◉</span> Dashboard</a>
        <a href="/history"><span class="sidebar__nav-icon">▤</span> History</a>
        <a href="/budget" class="active"><span class="sidebar__nav-icon">$</span> Budget</a>
        <a href="/alerts"><span class="sidebar__nav-icon">⚠</span> Alerts</a>
        <a href="/settings"><span class="sidebar__nav-icon">⚙</span> Settings</a>
      </nav>
      <div class="sidebar__footer">Tariff from settings</div>
    </aside>
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Budget &amp; Cost Estimator</h1>
          <p class="subtitle">Project consumption cost against an optional kWh cap</p>
        </div>
        <span class="badge" id="budget-status">—</span>
      </header>

      <div class="toolbar">
        <div class="form-group" style="margin:0">
          <label for="budget-hours">Billing period (hours)</label>
          <select id="budget-hours">
            <option value="24" selected>24</option>
            <option value="168">168 (7 days)</option>
            <option value="720">720 (30 days)</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label for="budget-cap">Cap (kWh, optional)</label>
          <input type="number" id="budget-cap" min="0" step="0.1" placeholder="e.g. 50" />
        </div>
        <button type="button" class="btn btn--primary" id="budget-refresh">Recalculate</button>
      </div>

      <p class="subtitle">Tariff: <span id="budget-tariff" class="mono">—</span></p>

      <section class="budget-summary">
        <div class="budget-card">
          <div class="budget-card__value" id="budget-energy">—</div>
          <div class="budget-card__label">Energy (kWh)</div>
        </div>
        <div class="budget-card">
          <div class="budget-card__value" id="budget-cost">—</div>
          <div class="budget-card__label">Estimated cost</div>
        </div>
        <div class="budget-card">
          <div class="budget-card__value" id="budget-cap-cost">—</div>
          <div class="budget-card__label">Cap cost at tariff</div>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/budget.js"></script>
</body>
</html>
